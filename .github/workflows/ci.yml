name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_MODE: simple
      CONVEX_DEPLOYMENT: dummy
      NEXT_PUBLIC_CONVEX_URL: https://example.convex.cloud
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: dummy
      CLERK_SECRET_KEY: dummy
      LIVEBLOCKS_SECRET_KEY: dummy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_API_KEY: dummy
      STRIPE_WEBHOOK_SECRET: dummy
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
